# Cross-platform message sync mapping
# Format: <source_pf>/<source_id>=<target_pf>/<target_id>
# Lines starting with # are comments
#
# Source ID conventions:
#   QQ group:   qq/group/<group_id>
#   QQ private: qq/private/<user_id>
#   Telegram:   telegram/<chat_id>
#   Discord:    discord/<channel_id>
#
# Examples (uncomment and fill in real IDs):
#qq/group/123456=telegram/-1001234567890
#qq/group/123456=discord/987654321
#telegram/-1001234567890=qq/group/123456
#telegram/-1001234567890=discord/987654321
